---
# Debian/Ubuntu package names and configuration

packages:
  - ccze
  - clang-tools
  - cloc
  - fswatch
  - fuse
  - git-delta
  - inotify-tools
  - lazygit
  - lf
  - nmap
  - nodejs
  - npm
  - pipx
  - python-is-python3
  - python3-pip
  - python3-venv
  - ranger
  - rust-analyzer
  - rustup
  - shellcheck
  - tealdeer
  - tree-sitter-cli
  - virtualenvwrapper
  - wl-clipboard
  - xclip

# Cargo packages to install
cargo_packages:
  - ruff
  - uv

# Whether to download NeoVim AppImage (apt repos have old version)
neovim_appimage: true
