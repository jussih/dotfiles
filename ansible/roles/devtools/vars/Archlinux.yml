  - posix-c-development
  - posix-software-development
  - python
  - python-pip
  - python-pipx
  - python-virtualenvwrapper
  - ranger
  - ruff
  - rust-analyzer
  - rustup
  - shellcheck
  - strace
  - stylua
  - tealdeer
  - texinfo
  - tree-sitter-cli
  - ty
  - uv
  - wl-clipboard
  - xclip
